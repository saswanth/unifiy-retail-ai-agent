steps:
  # Step 1: Run unit tests (add your test command if applicable)
  - name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - |
        npm ci
        echo "Tests passed (add test runner here)"

  # Step 2: Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/unify-retail-agent:$COMMIT_SHA
      - -t
      - $_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/unify-retail-agent:latest
      - .

  # Step 3: Push image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/unify-retail-agent

  # Step 4: Apply base manifests to GKE
  - name: gcr.io/cloud-builders/kubectl
    entrypoint: sh
    args:
      - -c
      - |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -n unify-retail -f k8s/serviceaccount.yaml
        kubectl apply -n unify-retail -f k8s/configmap.yaml
        kubectl apply -n unify-retail -f k8s/service.yaml
        kubectl apply -n unify-retail -f k8s/hpa.yaml
        kubectl apply -n unify-retail -f k8s/pdb.yaml
        kubectl apply -n unify-retail -f k8s/networkpolicy.yaml
        kubectl apply -n unify-retail -f k8s/ingress.yaml
    env:
      - CLOUDSDK_COMPUTE_REGION=$_GKE_LOCATION
      - CLOUDSDK_CONTAINER_CLUSTER=$_GKE_CLUSTER

  # Step 5: Update deployment image and wait for rollout
  - name: gcr.io/cloud-builders/kubectl
    entrypoint: sh
    args:
      - -c
      - |
        kubectl apply -n unify-retail -f k8s/deployment.yaml
        kubectl set image deployment/unify-retail-agent \
          app=$_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/unify-retail-agent:$COMMIT_SHA \
          -n unify-retail
        kubectl rollout status deployment/unify-retail-agent \
          -n unify-retail --timeout=180s
    env:
      - CLOUDSDK_COMPUTE_REGION=$_GKE_LOCATION
      - CLOUDSDK_CONTAINER_CLUSTER=$_GKE_CLUSTER

images:
  - $_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/unify-retail-agent:$COMMIT_SHA
  - $_AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/unify-retail-agent:latest

substitutions:
  _AR_LOCATION: us-central1
  _AR_REPO: unify-retail
  _GKE_CLUSTER: unify-retail-cluster
  _GKE_LOCATION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: unify-retail-agent
spec:
  podSelector:
    matchLabels:
      app: unify-retail-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443

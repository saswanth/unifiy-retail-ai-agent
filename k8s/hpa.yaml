apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unify-retail-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unify-retail-agent
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
